*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;padding-bottom:70px}
.header{background:linear-gradient(135deg,#1a237e,#0d47a1);padding:16px;text-align:center;border-bottom:3px solid #f5c518}
.header h1{font-size:20px;font-weight:900;letter-spacing:3px;color:#f5c518;text-transform:uppercase;margin-top:4px}
.header p{font-size:11px;color:#90caf9;margin-top:3px}
.tabs{display:flex;background:#111827;border-bottom:2px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:99}
.tab{flex:1;padding:12px 2px;border:none;background:none;color:#64748b;font-size:10px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;font-family:Arial,sans-serif;letter-spacing:0.5px}
.tab.active{color:#f5c518;border-bottom-color:#f5c518;background:rgba(245,197,24,0.04)}
.page{display:none;padding:14px;max-width:700px;margin:0 auto}
.page.active{display:block}
.card{background:#111827;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;margin-bottom:12px}
.card h2{font-size:14px;font-weight:900;color:#f5c518;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.flabel{display:block;font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;margin-top:10px}
select,input[type=password],input[type=text]{width:100%;padding:10px 12px;background:#1c2539;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#e2e8f0;font-size:13px;font-weight:600;outline:none;margin-bottom:4px;font-family:Arial,sans-serif}
input[type=number]{width:48px;padding:7px 2px;background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);border-radius:8px;color:#f5c518;font-size:19px;font-weight:900;text-align:center;outline:none;font-family:Arial,sans-serif}
.btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-top:8px;font-family:Arial,sans-serif;display:block}
.btn-gold{background:linear-gradient(90deg,#f5c518,#e8a800);color:#000}
.btn-blue{background:linear-gradient(90deg,#1a237e,#1565c0);color:#f5c518}
.btn-red{background:linear-gradient(90deg,#7f1d1d,#dc2626);color:#fecaca}
.btn-gray{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#64748b;font-size:11px;padding:8px;margin-top:6px}
.alert{padding:10px 13px;border-radius:10px;font-size:12px;font-weight:700;margin:8px 0}
.aok{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#86efac}
.aerr{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
.ainfo{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#93c5fd}
.awarn{background:rgba(245,197,24,0.12);border:1px solid rgba(245,197,24,0.3);color:#f5c518}
/* Barra giornata */

function showConnStatus(ok){
  var el=document.getElementById("conn-status");
  if(!el)return;
  el.textContent=ok?"🟢 Online":"🔴 Offline";
  el.style.color=ok?"#86efac":"#fca5a5";

// Carica tutto il DB da Firebase via REST e aggiorna ogni 30 secondi
function fbInit(){
  fbLoad();
  setInterval(fbLoad, 30000);
}

function fbLoad(){
  var xhr=new XMLHttpRequest();
  xhr.open("GET", FB_URL+"/.json", true);
  xhr.onload=function(){
    try{
      var data=JSON.parse(xhr.responseText)||{};
      DB.pro=data.pro||{};
      DB.ris=data.ris||{};
      DB.lock=data.lock||{};
      DB.partite39=data.partite39||[];
      if(data.codes){
        for(var k in data.codes) CODES[k]=data.codes[k];
      }
      FB_READY=true;
      showConnStatus(true);
      var activeTab=document.querySelector(".tab.active");
      if(activeTab){
        var id=activeTab.id.replace("tab-","");
        if(id==="class") renderClassifica();
        if(id==="tutti") renderTutti();
        if(id==="miei"&&loggedUser) loadPronoForm();
      }
    }catch(e){
      var d=document.getElementById("diag");
      if(d){d.style.display="block";d.textContent="PARSE ERR: "+e.message;}
    }
  };
  xhr.onerror=function(){
    showConnStatus(false);
    var d=document.getElementById("diag");
    if(d){d.style.display="block";d.textContent="XHR ERR: "+xhr.status+" "+xhr.statusText;}
  };
  xhr.send();
}

// Funzioni di scrittura su Firebase via REST
function fbSavePro(g, player, pronos, locked){
  var key=player.replace(/ /g,"_");
  fetch(FB_URL+"/pro/"+g+"/"+key+".json",{method:"PUT",body:JSON.stringify(pronos)});
  fetch(FB_URL+"/lock/"+g+"/"+key+".json",{method:"PUT",body:JSON.stringify(locked)});
}

function fbSaveRis(g, data){
  fetch(FB_URL+"/ris/"+g+".json",{method:"PUT",body:JSON.stringify(data)});
}

function fbSaveLock(g, player, val){
  var key=player.replace(/ /g,"_");
  fetch(FB_URL+"/lock/"+g+"/"+key+".json",{method:"PUT",body:JSON.stringify(val)});
}

function fbDelPro(g, player){
  var key=player.replace(/ /g,"_");
  fetch(FB_URL+"/pro/"+g+"/"+key+".json",{method:"DELETE"});
  fetch(FB_URL+"/lock/"+g+"/"+key+".json",{method:"DELETE"});
}

function fbSavePartite39(partite){
  fetch(FB_URL+"/partite39.json",{method:"PUT",body:JSON.stringify(partite)});
}

function fbSaveCode(player, newCode){
  var key=player.replace(/ /g,"_");
  return fetch(FB_URL+"/codes/"+key+".json",{method:"PUT",body:JSON.stringify(newCode)});
}

function cambiaCodice(){
  if(!loggedUser) return;
  var attuale=document.getElementById("inp-pwd-attuale").value.trim();
  var nuovo=document.getElementById("inp-pwd-nuovo").value.trim();
  var conferma=document.getElementById("inp-pwd-conferma").value.trim();
  if(!attuale||!nuovo||!conferma){sal("al-pwd","Compila tutti i campi.","aerr");return;}
  if(CODES[loggedUser]!==attuale){sal("al-pwd","Codice attuale errato.","aerr");return;}
  if(nuovo.length<4){sal("al-pwd","Il nuovo codice deve avere almeno 4 caratteri.","aerr");return;}
  if(nuovo!==conferma){sal("al-pwd","I due nuovi codici non coincidono.","aerr");return;}
  fbSaveCode(loggedUser, nuovo).then(function(){
    CODES[loggedUser]=nuovo;
    sal("al-pwd","Codice cambiato con successo!","aok");
    document.getElementById("inp-pwd-attuale").value="";
    document.getElementById("inp-pwd-nuovo").value="";
    document.getElementById("inp-pwd-conferma").value="";
  }).catch(function(){sal("al-pwd","Errore nel salvataggio.","aerr");});
}

function adminResetCodice(){
  var p=document.getElementById("sel-resetp").value;
  var nuovo=document.getElementById("inp-reset-code").value.trim();
  if(!nuovo||nuovo.length<4){sal("al-reset","Inserisci un codice di almeno 4 caratteri.","aerr");return;}
  fbSaveCode(p, nuovo).then(function(){
    CODES[p]=nuovo;
    sal("al-reset","Codice di "+p+" resettato a: "+nuovo,"aok");
    document.getElementById("inp-reset-code").value="";
    renderCodici();
  }).catch(function(){sal("al-reset","Errore nel salvataggio.","aerr");});
}

function getLockPlayer(g, player){
